name: vulnerable

on:
  schedule:
    - cron: "0 9 * * 0" # every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@653c485759755505036c9e4b09b86b1f6a6ae511 # v1.8.7
        with:
          shell: vulnerable

      - run: flake-checker -f
